<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>

<style>
body{
    text-align:center;
    background:#111;
    color:white;
    font-family:Arial;
}

canvas{
    background:black;
    margin-top:10px;
}

.controls{
    margin-top:20px;
}

button{
    width:70px;
    height:70px;
    font-size:24px;
    margin:5px;
}
</style>
</head>

<body>

<h2>Snake Game</h2>
<canvas id="game" width="300" height="300"></canvas>

<div class="controls">
<br>
<button onclick="changeDir('up')">⬆️</button>
<br>
<button onclick="changeDir('left')">⬅️</button>
<button onclick="changeDir('down')">⬇️</button>
<button onclick="changeDir('right')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = 15;
let count = 0;

let snake = {
    x: 150,
    y: 150,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
};

let apple = {
    x: 225,
    y: 225
};

function changeDir(dir){
    if(dir === "left" && snake.dx === 0){
        snake.dx = -grid;
        snake.dy = 0;
    }
    if(dir === "right" && snake.dx === 0){
        snake.dx = grid;
        snake.dy = 0;
    }
    if(dir === "up" && snake.dy === 0){
        snake.dy = -grid;
        snake.dx = 0;
    }
    if(dir === "down" && snake.dy === 0){
        snake.dy = grid;
        snake.dx = 0;
    }
}

function gameLoop(){
    requestAnimationFrame(gameLoop);

    if(++count < 6){
        return;
    }

    count = 0;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    snake.x += snake.dx;
    snake.y += snake.dy;

    if(snake.x < 0) snake.x = canvas.width - grid;
    else if(snake.x >= canvas.width) snake.x = 0;

    if(snake.y < 0) snake.y = canvas.height - grid;
    else if(snake.y >= canvas.height) snake.y = 0;

    snake.cells.unshift({x: snake.x, y: snake.y});

    if(snake.cells.length > snake.maxCells){
        snake.cells.pop();
    }

    ctx.fillStyle = "red";
    ctx.fillRect(apple.x, apple.y, grid-1, grid-1);

    ctx.fillStyle = "lime";
    snake.cells.forEach(function(cell, index){
        ctx.fillRect(cell.x, cell.y, grid-1, grid-1);

        if(cell.x === apple.x && cell.y === apple.y){
            snake.maxCells++;

            apple.x = Math.floor(Math.random()*20)*grid;
            apple.y = Math.floor(Math.random()*20)*grid;
        }

        for(let i=index+1; i<snake.cells.length; i++){
            if(cell.x === snake.cells[i].x && cell.y === snake.cells[i].y){
                snake.x = 150;
                snake.y = 150;
                snake.cells = [];
                snake.maxCells = 4;
                snake.dx = grid;
                snake.dy = 0;
            }
        }
    });
}

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
